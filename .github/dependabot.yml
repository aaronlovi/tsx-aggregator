# Dependabot configuration.
# Groups updates into a few PRs per week instead of one PR per dependency,
# which is what let the frontend accumulate dozens of open alerts.
version: 2
updates:
  # Frontend (Angular SPA)
  - package-ecosystem: "npm"
    directory: "/deep-value"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns:
          - "@angular*"
          - "@angular-devkit*"
          - "zone.js"
          - "rxjs"
      frontend-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Backend (.NET, central package management via Directory.Packages.props)
  - package-ecosystem: "nuget"
    directory: "/src"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      backend-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
